<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料相談・お見積もり | 工務店サイト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <header class="form-header">
            <h1>無料相談・お見積もりはこちら</h1>
            <p>しつこい営業は一切いたしませんのでご安心ください。<br class="pc-only">お気軽にご相談ください。</p>
        </header>

        <form id="contact-form" action="https://formspree.io/f/mnjlbzod" method="POST">
            <!-- Section: Basic Information -->
            <div class="form-section">
                <div class="form-group">
                    <label for="name">お名前 <span class="badge required">必須</span></label>
                    <input type="text" id="name" name="name" placeholder="例：山田 太郎" required>
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス <span class="badge required">必須</span></label>
                    <input type="email" id="email" name="email" placeholder="例：example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="tel">電話番号 <span class="badge required">必須</span></label>
                    <input type="tel" id="tel" name="tel" placeholder="例：090-0000-0000" required>
                </div>
            </div>

            <!-- Section: Inquiries -->
            <div class="form-section">
                <div class="form-group">
                    <label for="category">お問い合わせ種別 <span class="badge optional">任意</span></label>
                    <div class="select-wrapper">
                        <select id="category" name="category">
                            <option value="" selected disabled>選択してください</option>
                            <option value="新築">新築</option>
                            <option value="リフォーム">リフォーム</option>
                            <option value="外壁塗装">外壁塗装</option>
                            <option value="修理・メンテナンス">修理・メンテナンス</option>
                            <option value="見積もり希望">見積もり希望</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="area">工事予定エリア <span class="badge optional">任意</span></label>
                    <input type="text" id="area" name="area" placeholder="例：東京都渋谷区 または 150-0001">
                </div>

                <div class="form-group">
                    <label for="budget">ご予算 <span class="badge optional">任意</span></label>
                    <div class="select-wrapper">
                        <select id="budget" name="budget">
                            <option value="" selected disabled>選択してください</option>
                            <option value="〜100万円">〜100万円</option>
                            <option value="100〜300万円">100〜300万円</option>
                            <option value="300〜1000万円">300〜1000万円</option>
                            <option value="1000万円以上">1000万円以上</option>
                            <option value="未定">未定</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="timing">希望時期 <span class="badge optional">任意</span></label>
                    <div class="select-wrapper">
                        <select id="timing" name="timing">
                            <option value="" selected disabled>選択してください</option>
                            <option value="すぐ">すぐ</option>
                            <option value="1ヶ月以内">1ヶ月以内</option>
                            <option value="3ヶ月以内">3ヶ月以内</option>
                            <option value="半年以内">半年以内</option>
                            <option value="未定">未定</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>ご連絡方法 <span class="badge optional">任意</span></label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="contact_method" value="電話" checked>
                            <span class="custom-radio"></span>
                            電話
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="contact_method" value="メール">
                            <span class="custom-radio"></span>
                            メール
                        </label>
                    </div>
                </div>
            </div>

            <!-- Section: Message -->
            <div class="form-section">
                <div class="form-group">
                    <label for="message">お問い合わせ内容 <span class="badge required">必須</span></label>
                    <textarea id="message" name="message" rows="5" placeholder="ご質問やご相談内容を自由にご記入ください" required></textarea>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit" id="submit-button">無料で相談する</button>
            </div>
        </form>

        <div id="success-message" class="hidden">
            <div class="success-content">
                <div class="success-icon">✓</div>
                <h2>お問い合わせありがとうございます</h2>
                <p>内容を確認の上、担当よりご連絡いたします。</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('contact-form');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitButton = document.getElementById('submit-button');
            const originalText = submitButton.innerText;
            
            submitButton.disabled = true;
            submitButton.innerText = '送信中...';

            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    form.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    alert('送信に失敗しました。もう一度お試しください。');
                    submitButton.disabled = false;
                    submitButton.innerText = originalText;
                }
            } catch (error) {
                // Formspree IDが未設定の場合はシミュレーションとして成功を表示（デモ用）
                if (form.action.includes('YOUR_FORM_ID')) {
                    form.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                } else {
                    alert('エラーが発生しました。');
                    submitButton.disabled = false;
                    submitButton.innerText = originalText;
                }
            }
        });
    </script>
</body>
</html>
